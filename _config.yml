title: "bcdxn.github.io"
description: "Personal blog and project updates"
url: "https://bcdxn.github.io"
baseurl: "/"
repository: "bcdxn/bcdxn.github.io"
locale: "en-US"
google_site_verification: "K6u5d626bFyMSSU9GqyhYNlX_W0N4LMqsIGuLWWBPUo"
bing_site_verification: "9DCFCE8255E3F40C2A911BCFC08E5FAD"
remote_theme: "mmistakes/minimal-mistakes"

social:
  type: "Prson"
  name: "Benjamin Dixon"


plugins:
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  # - jekyll-remote-theme
author:
  name: "Benjamin Dixon"
  avatar: "/assets/images/profile/benjamin-dixon.jpg"
  bio: "otes on software, experiments, and learnings"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/bcdxn"
    - label: "X"
      icon: "fab fa-x-twitter"
      url: "https://x.com/Swo0o0o0p"
    - label: "Bluesky"
      icon: "fas fa-cloud"
      url: "https://bsky.app/profile/bcdxn.bsky.social"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/benjamin-dixon-44061214/"

collections:
  pages:
    output: true
    permalink: /:path/

include:
  - _pages
  - robots.txt

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

paginate: 5
paginate_path: /page:num/

atom_feed:
  hide: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/bcdxn"
    - label: "X"
      icon: "fab fa-x-twitter"
      url: "https://x.com/Swo0o0o0p"
    - label: "Bluesky"
      icon: "fas fa-cloud"
      url: "https://bsky.app/profile/bcdxn.bsky.social"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/benjamin-dixon-44061214/"
